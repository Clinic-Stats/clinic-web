<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سیستەمی کلینیک</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

  <!-- شاشەی چوونەژوورەوە -->
  <div id="loginPage">
    <div class="card login-card">
      <h1>🏥 چوونە ژوورەوە</h1>
      <label>ناوی کارمەند:</label>
      <input type="text" id="loginEmail" placeholder="نموونە: naza">
      <label>پاسوۆرد:</label>
      <input type="password" id="loginPassword" placeholder="******">
      <button id="btnLogin">چوونەژوورەوە</button>
      <p id="loginError"></p>
    </div>
  </div>

  <!-- شاشەی سەرەکی (داشبۆرد) -->
  <div id="dashboard" style="display:none;">
    <div class="topbar">
      <h1>📊 ئاماری نەخۆشان</h1>
      <div>
        <span id="currentUserName"></span>
        <button class="logout-btn" id="btnLogout">دەرچوون</button>
      </div>
    </div>

    <!-- بەشی بەڕێوەبەر -->
    <section class="card admin-panel" id="adminSection" style="display:none; border: 2px solid #e74c3c;">
      <h2>بەڕێوەبردن</h2>
      
      <!-- دوگمەی کردنەوەی فۆرمی کارمەند -->
      <button id="toggleAdminBtn" style="background:#2c3e50; margin-bottom:10px;">➕ زیادکردنی کارمەندی نوێ</button>
      
      <div id="adminFormWrapper" style="display:none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #ccc;">
        <label>ناوی کارمەند:</label>
        <input type="text" id="newStaffEmail" placeholder="ناوی کارمەند بێ بۆشایی">
        <label>پاسوۆرد:</label>
        <input type="password" id="newStaffPassword" placeholder="لانی کەم ٦ پیت">
        <button id="btnCreateStaff" style="background:#e74c3c;">تۆمارکردنی کارمەند</button>
        <p id="createStaffMsg"></p>
      </div>
    </section>

    <!-- بەشی داخڵکردنی داتا -->
    <section class="card">
      <h2>تۆمارکردنی نەخۆش</h2>
      <label>ژمارەی نەخۆش:</label>
      <input type="number" id="patientCount" placeholder="0" min="0">
      <label>ڕێکەوت:</label>
      <input type="date" id="entryDate" style="text-align: right; font-size: 1.1em; padding: 12px; font-weight: bold; width: 100%; box-sizing: border-box;">
      <button id="btnSaveEntry">پاشکەوتکردن</button>
      <p id="statusMsg"></p>
    </section>

    <!-- بەشی ئاماری ڕۆژانە -->
    <section class="card">
      <h2>ئاماری ڕۆژانە</h2>
      <label>ڕێکەوت هەڵبژێرە:</label>
      <input type="date" id="dailyFilterDate" style="text-align: right; font-size: 1.1em; padding: 12px; font-weight: bold; width: 100%; box-sizing: border-box;">
      <div class="button-group" style="margin-top: 10px;">
        <button id="btnLoadDaily">پیشاندان</button>
        <button id="btnExportDailyExcel" class="btn-excel">Excel</button>
        <button id="btnExportDailyPDF" class="btn-pdf">PDF</button>
      </div>
      <div id="dailyOutput"></div>
    </section>

    <!-- بەشی ئاماری هەفتانە -->
    <section class="card">
      <h2>ئاماری هەفتانە</h2>
      
      <!-- دوگمەکانی گۆڕینی هەفتە -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #f0f4f8; padding: 10px; border-radius: 8px;">
          <button id="btnNextWeek" style="width: auto; margin: 0; padding: 8px 12px; background: #7f8c8d;">داهاتوو ➡️</button>
          <strong id="weekLabelLabel" style="color: #2c3e50; font-size: 1.1em;">ئەم هەفتەیە</strong>
          <button id="btnPrevWeek" style="width: auto; margin: 0; padding: 8px 12px; background: #7f8c8d;">⬅️ پێشوو</button>
      </div>

      <div class="button-group">
        <button id="btnLoadWeekly">پیشاندان</button>
        <button id="btnExportWeeklyExcel" class="btn-excel">Excel</button>
        <button id="btnExportWeeklyPDF" class="btn-pdf">PDF</button>
      </div>
      <div id="weeklyOutput"></div>
      <canvas id="weeklyChart" height="100"></canvas>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
