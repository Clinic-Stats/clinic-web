<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سیستەمی کلینیک</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

  <!-- شاشەی چوونەژوورەوە -->
  <div id="loginPage">
    <div class="card login-card">
      <h1>🏥 چوونە ژوورەوە</h1>
      <label>ناوی کارمەند:</label>
      <!-- بەکارهێنانی onkeydown بۆ چوونە سەر پاسوۆرد -->
      <input type="text" id="loginEmail" placeholder="نموونە: naza" onkeydown="if(event.key === 'Enter') document.getElementById('loginPassword').focus();">
      <label>پاسوۆرد:</label>
      <input type="password" id="loginPassword" placeholder="******" onkeydown="if(event.key === 'Enter') window.login();">
      <button id="btnLogin">چوونەژوورەوە</button>
      <p id="loginError"></p>
    </div>
  </div>

  <!-- شاشەی سەرەکی (داشبۆرد) -->
  <div id="dashboard" style="display:none;">
    <div class="topbar">
      <h1>📊 ئاماری نەخۆشان</h1>
      <div>
        <span id="currentUserName"></span>
        <button class="logout-btn" id="btnLogout">دەرچوون</button>
      </div>
    </div>

    <!-- بەشی بەڕێوەبەر -->
    <section class="card admin-panel" id="adminSection" style="display:none; border: 2px solid #e74c3c;">
      <h2>بەڕێوەبردن</h2>
      <button id="toggleAdminBtn" style="background:#2c3e50; margin-bottom:10px;">➕ زیادکردنی کارمەندی نوێ</button>
      
      <div id="adminFormWrapper" style="display:none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #ccc;">
        <label>ناوی کارمەند:</label>
        <input type="text" id="newStaffEmail" placeholder="ناوی کارمەند بێ بۆشایی">
        <label>پاسوۆرد:</label>
        <input type="password" id="newStaffPassword" placeholder="لانی کەم ٦ پیت">
        <button id="btnCreateStaff" style="background:#e74c3c;">تۆمارکردنی کارمەند</button>
        <p id="createStaffMsg"></p>
      </div>
    </section>

    <!-- بەشی داخڵکردنی داتا -->
    <section class="card" style="text-align: center;">
      <h2>تۆمارکردنی نەخۆش</h2>
      
      <!-- گەورە -->
      <label style="margin-top: 15px;">🧑 ژمارەی نەخۆشی گەورە:</label>
      <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 10px; margin-bottom: 15px; direction: ltr;">
        <button type="button" onclick="window.changeCount('patientCountAdult', -1)" style="width: 45px; height: 45px; margin: 0; padding: 0; font-size: 24px; font-weight: bold; background-color: #e74c3c; border-radius: 8px;">-</button>
        <input type="number" id="patientCountAdult" value="0" min="0" style="width: 80px !important; height: 45px; margin: 0; padding: 5px; text-align: center; font-size: 20px; font-weight: bold; border-radius: 8px; border: 1px solid #ccc;">
        <button type="button" onclick="window.changeCount('patientCountAdult', 1)" style="width: 45px; height: 45px; margin: 0; padding: 0; font-size: 24px; font-weight: bold; background-color: #2ecc71; border-radius: 8px;">+</button>
      </div>

      <!-- منال -->
      <label style="margin-top: 5px;">🧒 ژمارەی نەخۆشی منال:</label>
      <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 10px; margin-bottom: 15px; direction: ltr;">
        <button type="button" onclick="window.changeCount('patientCountChild', -1)" style="width: 45px; height: 45px; margin: 0; padding: 0; font-size: 24px; font-weight: bold; background-color: #e74c3c; border-radius: 8px;">-</button>
        <input type="number" id="patientCountChild" value="0" min="0" style="width: 80px !important; height: 45px; margin: 0; padding: 5px; text-align: center; font-size: 20px; font-weight: bold; border-radius: 8px; border: 1px solid #ccc;">
        <button type="button" onclick="window.changeCount('patientCountChild', 1)" style="width: 45px; height: 45px; margin: 0; padding: 0; font-size: 24px; font-weight: bold; background-color: #2ecc71; border-radius: 8px;">+</button>
      </div>

      <label>ڕێکەوت:</label>
      <input type="date" id="entryDate" style="text-align: center; font-size: 1em; padding: 8px; font-weight: bold; width: 180px !important; display: block; margin: 5px auto 15px auto; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc;">
      
      <button id="btnSaveEntry" style="width: 100%;">پاشکەوتکردن</button>
      <p id="statusMsg"></p>
    </section>

    <!-- بەشی ئاماری ڕۆژانە -->
    <section class="card" style="text-align: center;">
      <h2>ئاماری ڕۆژانە</h2>
      <label>ڕێکەوت هەڵبژێرە:</label>
      <input type="date" id="dailyFilterDate" style="text-align: center; font-size: 1em; padding: 8px; font-weight: bold; width: 180px !important; display: block; margin: 5px auto 15px auto; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc;">
      
      <div class="button-group" style="margin-top: 10px;">
        <button id="btnLoadDaily">پیشاندان</button>
        <button id="btnExportDailyExcel" class="btn-excel">Excel</button>
        <button id="btnExportDailyPDF" class="btn-pdf">PDF</button>
      </div>
      <div id="dailyOutput" style="margin-top: 15px; text-align: right;"></div>
    </section>

    <!-- بەشی ئاماری هەفتانە -->
    <section class="card">
      <h2 style="text-align: center;">ئاماری هەفتانە</h2>
      
      <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; background: #f0f4f8; padding: 15px; border-radius: 8px; gap: 10px;">
          <!-- کۆمبۆبۆکس بۆ دیاریکردنی هەفتە -->
          <select id="weekSelector" onchange="window.selectWeekFromDropdown()" style="width: 100%; max-width: 300px; padding: 10px; font-size: 16px; border-radius: 8px; font-weight: bold; text-align: center;">
              <!-- هەفتەکان لە ڕێگەی جاڤاسکپریپتەوە پڕ دەکرێنەوە -->
          </select>
          <div id="weekDateRangeLabel" style="font-size: 0.9em; color: #555; text-align: center; margin-top: 5px;"></div>
      </div>

      <div class="button-group">
        <button id="btnLoadWeekly">پیشاندان</button>
        <button id="btnExportWeeklyExcel" class="btn-excel">Excel</button>
        <button id="btnExportWeeklyPDF" class="btn-pdf">PDF</button>
      </div>
      <div id="weeklyOutput"></div>
      <canvas id="weeklyChart" height="100"></canvas>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
